<!DOCTYPE html>
<html lang="eg">

<head>
    <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <style>
        #main {
            width: 1200px;
            margin: 0 auto;
            height: 100%;
        }

        #shapka {
            max-width: 1200px;
            height: 80px;
            background: yellow;
            outline: 1px solid #000;
        }

        #vshapke {
            float: left;
            width: 200px;
            height: 40px;
            background: white;
            margin: 20px;
        }

        #leftblue {
            float: left;
            width: 300px;
            height: 410px;
            background: blue;
            outline: 1px solid #000;
            word-wrap: break-word;
        }

        #otsyp{
            float: right;
            width: 900px;
            height: 410px;
            background: white;
            outline: 1px solid #000;
            word-wrap: break-word;
        }

        #left {
            float: left;
            width: 470px;
            height: 250px;
            background: white;
            outline: 1px solid #000;
            margin-left: 20px;
            margin-top: 20px;
            word-wrap: break-word;
        }

        #right {
            float: right;
            width: 375px;
            height: 350px;
            background: blue;
            outline: 1px solid #000;
            word-wrap: break-word;
            margin-right: 20px;
            margin-top: 20px;
        }

        #end {
            float: inline-end;
            width: 1201px;
            height: 80px;
            background: red;
            margin: auto 0;
            bottom: 15%;
        }

        #minred {
            float: left;
            width: 470px;
            height: 100px;
            background: red;
            outline: 1px solid #000;
            margin-left: 20px;
            word-wrap: break-word;
        }

        #shapkaEnd {
            margin-top: 410px;
            margin-left: 0px;
            width: 1200px;
            height: 80px;
            background: yellow;
            outline: 1px solid #000;
            clear: left;
        }


    </style>

    <div id="main">

        <div id="shapka">
            <div id="vshapke"></div>
        </div>

        <div id="content">
            <div id="leftblue"></div>
            <div id="otsyp">
                <div id="left"></div>
                <div id="right"></div>
                <div id="minred" ></div>

            </div>

        </div>
        <div id="shapkaEnd" ></div>

    </div>

</body>

</html>
