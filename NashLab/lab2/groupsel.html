  <figcaption>Коли ви групуєте селектори CSS, ви застосовуєте однакові стилі до кількох різних елементів без повторення стилів у вашій таблиці стилів. Замість того, щоб мати два, три або більше правил CSS, які роблять одне і те ж (наприклад, встановіть колір чогось на червоний), ви використовуєте одне правило CSS, яке виконує те саме. Секрет цієї тактики підвищення ефективності – кома.</figcaption>
